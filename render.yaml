services:
  - type: web
    name: qorbit-vdd
    runtime: python
    rootDir: web_app
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CONF_THRESHOLD
        value: "0.15"
      - key: ANTHROPIC_API_KEY
        sync: false
